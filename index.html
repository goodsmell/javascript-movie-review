        <div class="top-header-conatiner">
          <h1 class="logo">
            <img src="./templates/images/logo.png" alt="MovieList" />
          </h1>
          <form class="search">
            <input
              class="search-input"
              type="text"
              aria-label="검색"
              placeholder="검색어를 입력하세요"
            />
            <button class="search-button">
              <img src="./src/assets/serchIcon.png" alt="검색버튼" />
            </button>
          </form>
        </div>

        <div class="background-container">
          <div class="overlay" aria-hidden="true">
            <img class="background-img" />
          </div>
          <div class="top-rated-container">
            <div class="top-rated-movie">
              <div class="rate">
                <img src="./templates/images/star_empty.png" class="star" />
                <span class="rate-value">9.5</span>
              </div>
              <div class="title">인사이드 아웃2</div>
              <button class="primary detail">자세히 보기</button>
            </div>
          </div>
        </div>
      </header>
